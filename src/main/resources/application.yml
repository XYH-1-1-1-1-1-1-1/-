# AI 模拟面试与能力提升软件 - 配置文件
server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: interview-simulation
  
  # 数据源配置 - SQLite
  datasource:
    url: jdbc:sqlite:./data/interview.db?busy_timeout=5000&locking_mode=EXCLUSIVE
    driver-class-name: org.sqlite.JDBC
    hikari:
      # SQLite 不支持多连接并发写入，设置最大连接数为 1
      maximum-pool-size: 1
      minimum-idle: 1
      # 连接超时时间
      connection-timeout: 30000
      # 空闲连接超时
      idle-timeout: 600000
      # 最大生命周期
      max-lifetime: 1800000
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
        # SQLite JDBC 不支持 getGeneratedKeys
        jdbc:
          use_get_generated_keys: false
        # 使用 native 策略（SQLite 的 AUTOINCREMENT）
        id:
          generator:
            strategy: native
  
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# 应用配置
app:
  # 大模型 API 配置 - 使用阿里云 DashScope（通义千问）
  # 注册地址：https://dashscope.console.aliyun.com/ 获取 API Key
  # 每日免费额度：qwen-turbo 每日 200 万 tokens 免费
  llm:
    # API 提供商：dashscope / openrouter / huggingface / ollama
    provider: dashscope
    # API Key
    api-key: sk-02e488d845ad4d38a4cf89ee8c5e52ec
    # API 基础 URL（DashScope 兼容 OpenAI 格式）
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    # 默认模型（通义千问 turbo 模型，免费额度充足）
    model: qwen-turbo
    # 备选模型列表
    fallback-models:
      - qwen-plus
      - qwen-max
      - qwen-long
  
  # 语音识别 API 配置
  speech:
    # 使用浏览器 Web Speech API (前端实现)
    # 或使用 Azure Speech Service / Google Cloud Speech
    provider: browser-native
  
  # 系统配置
  system:
    # 面试超时时间 (分钟)
    interview-timeout: 30
    # 每轮回答最大字数
    max-answer-length: 500
    # 历史面试记录保留数量
    max-history-records: 50

# 日志配置
logging:
  level:
    root: INFO
    com.ruijie.interview: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"