# AI 模拟面试与能力提升软件 - 配置文件
server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: interview-simulation
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  
  # 数据源配置 - SQLite
  datasource:
    url: jdbc:sqlite:./data/interview.db?busy_timeout=15000&locking_mode=NORMAL
    driver-class-name: org.sqlite.JDBC
    hikari:
      # SQLite 在 WAL 模式下支持多连接并发读取
      # 增加连接池大小以支持异步评分等并发操作
      maximum-pool-size: 5
      minimum-idle: 2
      # 连接超时时间（增加到 45 秒，给异步操作更多时间）
      connection-timeout: 45000
      # 空闲连接超时
      idle-timeout: 600000
      # 最大生命周期
      max-lifetime: 1800000
      # 连接测试查询，确保连接有效
      connection-test-query: SELECT 1
      # 泄漏检测超时（用于调试连接泄漏）
      leak-detection-threshold: 60000
  
  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
        # SQLite JDBC 不支持 getGeneratedKeys
        jdbc:
          use_get_generated_keys: false
        # 使用 native 策略（SQLite 的 AUTOINCREMENT）
        id:
          generator:
            strategy: native
  
  # Jackson 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

# 应用配置
app:
  # 大模型 API 配置 - 使用阿里云 DashScope（通义千问）
  # 注册地址：https://dashscope.console.aliyun.com/ 获取 API Key
  # 每日免费额度：qwen-turbo 每日 200 万 tokens 免费
  llm:
    # API 提供商：dashscope / openrouter / huggingface / ollama
    provider: dashscope
    # API Key
    api-key:
    # API 基础 URL（DashScope 兼容 OpenAI 格式）
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    # 默认模型（通义千问 3.6-plus 模型，支持深度思考）
    model: qwen3.6-plus
    # 是否启用深度思考功能（仅 qwen3.6-plus 等模型支持）
    enable-thinking: true
    # 备选模型列表
    fallback-models:
      - qwen3.6-plus
      - qwen-plus
      - qwen-max
      - qwen-long
  
  # 语音识别 API 配置
  speech:
    # 使用浏览器 Web Speech API (前端实现)
    # 或使用 Azure Speech Service / Google Cloud Speech
    provider: browser-native
  
  # 系统配置
  system:
    # 面试超时时间 (分钟)
    interview-timeout: 60
    # 每轮回答最大字数
    max-answer-length: 500
    # 历史面试记录保留数量
    max-history-records: 50
  
  # RAG 向量搜索配置
  rag:
    # 是否启用向量增强搜索（默认启用）
    enable-vector-search: true
    # 向量搜索在混合搜索中的权重 (0-1)，剩余权重用于关键词匹配
    # 0.7 表示向量相似度占 70%，关键词匹配占 30%
    vector-weight: 0.7
  
  # PDF解析器配置
  pdf:
    parser:
      # Tesseract OCR 数据文件路径 (tessdata目录)
      # 需要下载中文语言包 chi_sim.traineddata
      # 下载地址：https://github.com/tesseract-ocr/tessdata
      # Windows 用户可以将 tessdata 文件夹放在项目根目录或指定绝对路径
      tessdata-path: ./tessdata
      # OCR 识别语言：chi_sim=简体中文, eng=英文
      ocr-lang: chi_sim+eng

# 日志配置
logging:
  level:
    root: INFO
    com.ruijie.interview: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"